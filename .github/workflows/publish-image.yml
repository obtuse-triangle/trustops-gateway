name: Publish Docker image

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  GATEWAY_IMAGE_NAME: ghcr.io/obtuse-triangle/trustops-gateway
  EVALUATOR_IMAGE_NAME: ghcr.io/obtuse-triangle/trustops-evaluator

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set gateway image tags
        id: tags
        run: |
          {
            echo "tags<<EOF"
            echo "${GATEWAY_IMAGE_NAME}:sha-${GITHUB_SHA}"
            if [ "${GITHUB_REF}" = "refs/heads/main" ]; then
              echo "${GATEWAY_IMAGE_NAME}:latest"
            fi
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Set evaluator image tags
        id: evaluator-tags
        run: |
          {
            echo "tags<<EOF"
            echo "${EVALUATOR_IMAGE_NAME}:sha-${GITHUB_SHA}"
            if [ "${GITHUB_REF}" = "refs/heads/main" ]; then
              echo "${EVALUATOR_IMAGE_NAME}:latest"
            fi
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build and push gateway image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.tags.outputs.tags }}

      - name: Build and push evaluator image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.evaluator
          platforms: linux/amd64
          push: true
          tags: ${{ steps.evaluator-tags.outputs.tags }}
